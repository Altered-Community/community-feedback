name: Auto-label by service

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            // Extract service value from the form body (### Service\n\n<value>)
            const match = body.match(/###\s*Service[\r\n]+([^\r\n#]+)/);
            if (!match) return;

            const service = match[1].trim();

            const serviceMap = {
              'Cards API':                 { label: 'cards-api',               color: '0075ca' },
              'Decks API':                 { label: 'decks-api',               color: 'e4e669' },
              'Collection API':            { label: 'collection-api',          color: 'e4e669' },
              'Ownership':                 { label: 'ownership',               color: '6f42c1' },
              'Auth (Keycloak)':           { label: 'auth',                    color: 'd93f0b' },
              'alteredcore.org (website)': { label: 'alteredcore.org website', color: '0e8a16' },
              'altered.re (website)':      { label: 'altered.re website',      color: '0e8a16' },
              'General / Cross-service':   { label: 'general',                 color: 'cccccc' },
              'General':                   { label: 'general',                 color: 'cccccc' },
            };

            const entry = serviceMap[service];
            if (!entry) return;

            const { label, color } = entry;
            const allServiceLabels = [...new Set(Object.values(serviceMap).map(e => e.label))];

            // Ensure the label exists, create it if not
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color,
              });
            }

            // Remove any existing service labels (handles edits that change service)
            const currentLabels = context.payload.issue.labels.map(l => l.name);
            for (const existing of currentLabels) {
              if (allServiceLabels.includes(existing) && existing !== label) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  name: existing,
                });
              }
            }

            // Apply the service label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [label],
            });
