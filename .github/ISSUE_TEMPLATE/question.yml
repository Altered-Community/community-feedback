name: Question
description: Ask a question or request clarification about a service
title: "[Question] "
labels: ["question"]
body:
  - type: dropdown
    id: service
    attributes:
      label: Service
      description: Which service is your question about?
      options:
        - Cards API
        - Decks API
        - Collection API
        - Ownership
        - Auth (Keycloak)
        - alteredcore.org (website)
        - altered.re (website)
        - General
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any background information that might help us answer your question.
    validations:
      required: false
