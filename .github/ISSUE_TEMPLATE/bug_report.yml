name: 🐛 Bug report
description: Report something that is not working
title: "[BUG] "
labels: ["bug"]
body:
  - type: input
    id: project
    attributes:
      label: Affected project
      placeholder: website / api / cards-db / infra
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe the issue
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)