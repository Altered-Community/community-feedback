name: Bug report
description: Report something that is broken or behaving unexpectedly
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: service
    attributes:
      label: Service
      description: Which service is affected?
      options:
        - General
        - Cards API
        - Decks API
        - Collection API
        - Ownership
        - Auth (Keycloak)
        - alteredcore.org (website)
        - altered.re (website)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Any other relevant information: browser/OS version, API endpoint, request/response payload, screenshots, etc.
    validations:
      required: false
